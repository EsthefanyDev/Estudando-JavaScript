<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Faixa Etária</title>
    <script>
        var idade = prompt("Digite a sua idade: ")

        if (idade >= 0 && idade < 15) {
            alert("Criança")
        } else if (idade >= 15 && idade < 30) {
            alert("Jovem")
        } else if (idade >= 30 && idade < 60) {
            alert("Adulto")
        } else {
            alert("Idoso")
        }



    </script>
</head>

</html>
