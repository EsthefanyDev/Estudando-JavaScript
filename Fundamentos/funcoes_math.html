<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funções Math</title>
    <script>
        var x = Math.ceil(10.380); // arredonda para cima, retornando 11
        var y = Math.floor(10.380); // arredonda para baixo, retornando 10
        var z = Math.round(10.380); // arredonda para o inteiro mais próximo, retornando 10
        var a = Math.max(5,10,3); // retorna o maior valor, retornando 10
        var b = Math.min(5,10,3); // retorna o menor valor, retornando 3
        var c = Math.random(); // retorna um número aleatório entre 0 (inclusive) e 1 (exclusive)
        var d = Math.pow(2, 3); // retorna o resultado de 2 elevado a 3, retornando 8
        var e = Math.sqrt(16); // retorna a raiz quadrada de 16, retornando 4
        var f = Math.abs(-5); // retorna o valor absoluto de -5, retornando 5
        var g = Math.PI; // retorna o valor de π, aproximadamente 3.141
        var h = Math.E; // retorna o valor de e, aproximadamente 2.718
        var i = Math.sin(Math.PI / 2); // retorna o seno de π/2, retornando 1
        var j = Math.cos(0); // retorna o cosseno de 0, retornando 1
        var k = Math.tan(Math.PI / 4); // retorna a tangente de π/4, retornando 1
        var l = Math.log(1); // retorna o logaritmo natural de 1, retornando 0
        var m = Math.exp(1); // retorna o valor de e elevado a 1, retornando aproximadamente 2.718
        var n = Math.sign(-10); // retorna o sinal de um número, retornando -1 para números negativos
        var o = Math.trunc(10.380); // retorna a parte inteira de um número, retornando 10
        var p = Math.cbrt(27); // retorna a raiz cúbica de 27, retornando 3
        var q = Math.hypot(3, 4); // retorna a hipotenusa de um triângulo retângulo com lados de comprimento 3 e 4, retornando 5
        var r = Math.log10(100); // retorna o logaritmo base 10 de 100, retornando 2
        var s = Math.log2(8); // retorna o logaritmo base 2 de 8, retornando 3

    </script>
</head>

</body>
</html>
