<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício</title>
    <script>
        var objetos = Array('Cadeira', 'Impressora', 'Garfo')
       
        function adicionar(){
            var valor = document.getElementById('campo').value.trim()
            if(valor === ''){
                alert('Informe um valor válido')
            } else {
                if(objetos.includes(valor)){
                    alert('Objeto já foi adicionado.')
                } else {
                    objetos.push(valor)
                    console.log(objetos)
                    document.getElementById('campo').value = ''
                }
            }         
        }
        function ordenar(){
            objetos.sort()
            console.log(objetos)
        }
        
       
      

        
    </script>

</head>
<body>
    <input id="campo" type="text">
    <button  onclick="adicionar()" type="button">Adicionar</button>
    <button onclick="ordenar()" type="button">Ordenar</button>
   
</body>
</html>
