<!DOCTYPE html>
<html>

<head>
    <title></title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        let nome = 'Anna' // document.getElementById('nome').value
        let idade = 27
        let sexo = 'Feminino'
        let profissao = 'Programadora'

        let objeto = {
            nome: nome,
            idade: idade,
            sexo: sexo,
            profissao: profissao,
            exibirResumo: function(){
                console.log(`${this.nome}, ${idade} anos, ${sexo} é ${profissao}`)
            }
        }
        console.log(objeto)
        objeto.exibirResumo()

        // melhoria ES6
         let objeto2 = {
            nomeTeste: nome, //nome = nome variável / valor = valor da variável
            idade,
            sexo,
            profissao,
            exibirResumo(){
                console.log(`${this.nomeTeste}, ${idade} anos, ${sexo} é ${profissao}`)
            }
        }
        console.log(objeto2)
        objeto2.exibirResumo()
    </script>
</head>

<body>
    
</body>

</html>
