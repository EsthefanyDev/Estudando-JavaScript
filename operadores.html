<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 1 - Operadores</title>
    <script>
        console.log('------Operadores------');

        var numero = 2e2; // Notação científica para representar números grandes (2 x 10^2)
        console.log(numero);  

        var soma = 10 + 5; // Adição
        var subtracao = 10 - 5; // Subtração
        var multiplicacao = 10 * 5; // Multiplicação
        var divisao = 10 / 5; // Divisão
        var modulo = 10 % 3; // Resto da divisão
        var exponenciacao = 2 ** 3; // Exponenciação (2 elevado a 3)

        console.log('------Operadores Aritméticos(String) ------');

        var soma = '100' + 50; // Concatenação de string e número
        console.log(soma); 

        var subtracao = '100' - 50; 
        console.log(subtracao);

        var multiplicacao = '100' * '2'; // Multiplicação de strings que representam números
        console.log(multiplicacao);

        var divisao = 'comprei 10'/ 2;
        console.log(divisao); // NaN (Not a Number) - resultado de uma operação inválida com strings
    </script>
</head>

</body>
